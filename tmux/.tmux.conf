# ==========================================
# 1. 基础环境与终端配置 (Environment)
# ==========================================
set -g default-shell /bin/zsh
set -g default-command /bin/zsh
# 开启 256 色及真彩色 (True Color) 支持
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# ==========================================
# 2. 核心行为设置 (Core Settings)
# ==========================================
set -g mouse on                   # 开启鼠标支持
set -g history-limit 100000       # 提升历史记录容量
set -g escape-time 0              # 取消 ESC 键延迟（对 Neovim 极其重要）
setw -g mode-keys vi              # 复制模式使用 vi 按键绑定
set -g renumber-windows on        # 关闭窗口后自动重新编号
set -g detach-on-destroy off      # 销毁会话时不退出 Tmux，而是切换到其他会话

# 窗口与面板索引从 1 开始（符合人类直觉与键盘布局）
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1

# ==========================================
# 3. 快捷键绑定 (Key Bindings)
# ==========================================
# 重置前缀键为 Ctrl-s
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# 快捷重载配置
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# TmuxCC 仪表盘（prefix + t）
bind t if-shell '[ -x "$HOME/.local/bin/tmuxcc" ]' 'display-popup -E "$HOME/.local/bin/tmuxcc"' 'display-message "tmuxcc not found: ~/.local/bin/tmuxcc"'

# 窗口重命名
bind R command-prompt -I "#W" "rename-window '%%'"
bind , command-prompt -I "#W" "rename-window '%%'"

# 创建窗口与面板 (保持当前路径)
bind n new-window
bind - split-window -v -c '#{pane_current_path}'  # 垂直分割
bind \\ split-window -h -c '#{pane_current_path}' # 水平分割

# 窗口切换
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -r H previous-window
bind -r L next-window

# 面板导航 (Vim 风格)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 面板调整大小
bind -n M-Left resize-pane -L 2
bind -n M-Right resize-pane -R 2
bind -n M-Up resize-pane -U 2
bind -n M-Down resize-pane -D 2
bind -n C-S-z resize-pane -Z      # 最大化/恢复当前面板

# 复制模式 (Vim 风格)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================================
# 4. 外观与主题 (UI & Theme)
# ==========================================
# 状态栏基础设置
set -g status-position bottom
set -g status-interval 1
set -g status-style "bg=#11111b,fg=#cdd6f4"
set -g message-style "bg=#1e1e2e,fg=#cdd6f4"

# 面板边框样式
set -g pane-border-lines single
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89dceb" # 高亮当前面板边框

# 窗口非激活/激活时的亮度对比 (Dim 效果)
set -g window-style "dim"
set -g window-active-style "nodim"

# 状态栏左右侧格式
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#11111b,bg=#cba6f7,bold] #S "
set -g status-right "#[fg=#f5e0dc,bg=#11111b] %Y-%m-%d %H:%M "

# 状态栏窗口列表格式
set -g window-status-format "#[fg=#cdd6f4,bg=#181825] #I:#W "
set -g window-status-current-format "#[fg=#11111b,bg=#cba6f7,bold] #I:#W "

# ==========================================
# 5. 插件管理 (Plugins)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'


# 强行覆盖原生的 prefix + w 和 prefix + s
set -g @sessionx-bind 'w'

# 浮窗 UI 美化设置 (完美适配你的极客屏)
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-layout 'reverse'
set -g @sessionx-bind-kill-session 'ctrl-k'

# 开启 Zoxide 智能目录跳转支持 (输入目录名直接创建/跳转 Session)
set -g @sessionx-zoxide-mode 'on'

# 自定义一些按键行为 (在浮窗内按 ? 可查看所有快捷键)
set -g @sessionx-filter-mru 'false'
# 插件专属配置
set -g @resurrect-dir '~/dotfiles/tmux/resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# 初始化 TPM 插件管理器 (必须放在文件绝对末尾!)
run '~/.tmux/plugins/tpm/tpm'
